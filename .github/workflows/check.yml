name: Check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Una vez al año: 1 de diciembre a las 00:00 UTC
    - cron: "0 0 1 12 *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run check
        run: ./check.sh
